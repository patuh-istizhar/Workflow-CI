name: CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE_NAME: patuhio/diabetes-baseline-model

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: 3.12.7
          activate-environment: mlflow-env
          environment-file: MLProject/conda.yaml

      - name: Run MLflow Project
        shell: bash -l {0}
        run: |
          mlflow run MLProject/ \
            -P train_path=processed_data/train_processed.csv \
            -P test_path=processed_data/test_processed.csv \
            -P n_estimators=100 \
            -P max_depth=10

      - name: Get Latest MLflow Run ID
        shell: bash -l {0}
        run: |
          RUN_ID=$(ls -1t mlruns/0 | grep -E '^[a-f0-9]{32}$' | head -n 1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Build Docker Model
        shell: bash -l {0}
        run: |
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "diabetes-baseline-model"

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag & Push Docker Image
        shell: bash -l {0}
        run: |
          docker tag diabetes-baseline-model ${{ env.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ env.DOCKER_IMAGE_NAME }}:latest
